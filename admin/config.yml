backend:
  name: git-gateway
  branch: main

media_folder: assets
public_folder: /assets

locale: fr

collections:
  - name: pages
    label: Pages
    files:

      - name: home
        label: Accueil
        file: index.njk
        fields:
          - { label: "Titre SEO", name: title, widget: string }
          - { label: "Description SEO", name: description, widget: string }
          - label: "Héro"
            name: hero_eyebrow
            widget: string
            hint: "Petit texte au-dessus du titre (ex: Cabinet Indépendant — TOULOUSE)"
          - { label: "Titre héro", name: hero_title, widget: string }
          - { label: "Texte héro", name: hero_text, widget: text }
          - { label: "Bouton héro", name: hero_cta, widget: string }
          - label: "Section À propos"
            name: about_tag
            widget: string
          - { label: "Titre À propos", name: about_title, widget: string }
          - { label: "Paragraphe 1", name: about_text1, widget: text }
          - { label: "Paragraphe 2", name: about_text2, widget: text }
          - label: "Section Professionnels"
            name: pro_section_label
            widget: string
          - { label: "Titre Professionnels", name: pro_title, widget: string }
          - label: "Section Particuliers"
            name: part_section_label
            widget: string
          - { label: "Titre Particuliers", name: part_title, widget: string }
          - { label: "Texte bande de contact", name: contact_strip, widget: string }

      - name: cabinet
        label: Le Cabinet
        file: cabinet.njk
        fields:
          - { label: "Titre SEO", name: title, widget: string }
          - { label: "Description SEO", name: description, widget: string }
          - label: "Héro"
            name: hero_label
            widget: string
          - { label: "Titre héro", name: hero_title, widget: string }
          - { label: "Texte héro", name: hero_text, widget: text }
          - label: "Section Histoire"
            name: histoire_label
            widget: string
          - { label: "Titre histoire", name: histoire_title, widget: string }
          - { label: "Paragraphe 1", name: histoire_p1, widget: text }
          - { label: "Paragraphe 2", name: histoire_p2, widget: text }
          - { label: "Paragraphe 3", name: histoire_p3, widget: text }
          - label: "Valeur 1"
            name: valeur1_title
            widget: string
          - { label: "Texte valeur 1", name: valeur1_text, widget: text }
          - label: "Valeur 2"
            name: valeur2_title
            widget: string
          - { label: "Texte valeur 2", name: valeur2_text, widget: text }
          - label: "Valeur 3"
            name: valeur3_title
            widget: string
          - { label: "Texte valeur 3", name: valeur3_text, widget: text }
          - { label: "Titre CTA", name: cta_title, widget: string }
          - { label: "Texte CTA", name: cta_text, widget: text }

      - name: professionnels
        label: Professionnels
        file: professionnels.njk
        fields:
          - { label: "Titre SEO", name: title, widget: string }
          - { label: "Description SEO", name: description, widget: string }
          - { label: "Titre héro", name: hero_title, widget: string }
          - { label: "Texte héro", name: hero_text, widget: text }
          - { label: "Titre intro", name: intro_title, widget: string }
          - { label: "Paragraphe intro 1", name: intro_p1, widget: text }
          - { label: "Paragraphe intro 2", name: intro_p2, widget: text }
          - { label: "Titre services", name: services_title, widget: string }
          - { label: "Intro services", name: services_intro, widget: text }
          - { label: "Titre CTA", name: cta_title, widget: string }
          - { label: "Texte CTA", name: cta_text, widget: text }

      - name: particuliers
        label: Particuliers
        file: particuliers.njk
        fields:
          - { label: "Titre SEO", name: title, widget: string }
          - { label: "Description SEO", name: description, widget: string }
          - { label: "Titre héro", name: hero_title, widget: string }
          - { label: "Texte héro", name: hero_text, widget: text }
          - { label: "Titre services", name: services_title, widget: string }
          - { label: "Intro services", name: services_intro, widget: text }
          - { label: "Titre CTA", name: cta_title, widget: string }
          - { label: "Texte CTA", name: cta_text, widget: text }

      - name: contact
        label: Contact
        file: contact.njk
        fields:
          - { label: "Titre héro", name: hero_title, widget: string }
          - { label: "Texte héro", name: hero_text, widget: text }
          - { label: "Titre formulaire", name: form_title, widget: string }
          - { label: "Introduction formulaire", name: form_intro, widget: text }
          - { label: "Horaires", name: hours_text, widget: text }

  - name: site
    label: Informations du site
    files:
      - name: site_info
        label: Coordonnées & infos
        file: _data/site.yml
        fields:
          - { label: "Nom du cabinet", name: name, widget: string }
          - { label: "Accroche", name: tagline, widget: string }
          - { label: "Téléphone (affichage)", name: phone, widget: string }
          - { label: "Téléphone (lien tel:)", name: phone_href, widget: string }
          - { label: "Email", name: email, widget: string }
          - { label: "Adresse", name: address, widget: string }
          - { label: "Numéro ORIAS", name: orias, widget: string }
          - { label: "Année de fondation", name: founded, widget: string }
          - { label: "LinkedIn URL", name: linkedin, widget: string }
          - { label: "Instagram URL", name: instagram, widget: string }
          - { label: "Facebook URL", name: facebook, widget: string }
